<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>News Site</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-2xl mx-auto p-4">

  <h1 class="text-xl font-bold mb-4">🔥 Tech & Game News</h1>

  <div id="posts" class="space-y-4"></div>

</div>

<script>
async function loadPosts() {
  const res = await fetch("/api/posts");
  const data = await res.json();

  document.getElementById("posts").innerHTML =
    data.map(p => `
      <div class="bg-white p-3 rounded shadow">
        <img src="${p.image_url || ''}" class="w-full h-40 object-cover rounded mb-2"/>
        <h2 class="font-bold">${p.title}</h2>
        <p class="text-sm text-gray-500">${p.source}</p>
      </div>
    `).join('');
}

loadPosts();
</script>

</body>
</html>
